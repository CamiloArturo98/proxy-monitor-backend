# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Application ──────────────────────────────────────────────────────────────
spring.application.name=proxy-monitor

# ─── DataSource (H2 in-memory) ────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:proxydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ─── H2 Console (solo dev) ────────────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ─── Proxy Config ─────────────────────────────────────────────────────────────
app.proxy.payment-failure-rate=0.10
app.proxy.simulate-load-calls=50